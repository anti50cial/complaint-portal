services:
  - type: web
    name: complaint-portal-backend
    runtime: node
    buildCommand: cd backend && bun install && bun run build && bun prisma generate
    startCommand: cd backend && bun run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: complaint-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
        description: "The URL of your Netlify frontend (e.g. https://your-app.netlify.app)"

databases:
  - name: complaint-portal-db
    plan: free
